<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>格擋之刃</title>
<style>
  html,body{margin:0;padding:0;background:#0d0f14;color:#eee;font-family:sans-serif;overflow:hidden;height:100%;}
  #app{display:flex;flex-direction:column;height:100%;}
  #hud{padding:6px 10px;display:flex;justify-content:space-between;align-items:center;font-size:14px;}
  #hpRow{display:flex;gap:16px;align-items:center;}
  #playerHearts{display:inline-flex;gap:2px;}
  .heart{width:14px;height:14px;border-radius:3px;background:#333;display:inline-block;}
  .heart.full{background:#ff5252;}
  #enemyHp{display:flex;align-items:center;gap:6px;}
  #enemyHp .bar{width:120px;height:10px;background:#333;border-radius:5px;overflow:hidden;display:inline-block;vertical-align:middle;}
  #enemyHpFill{height:100%;background:linear-gradient(90deg,#ff8a65,#ef5350);width:100%;transition:width .15s;}
  #enemyHpNum{font-size:12px;color:#ffab91;min-width:34px;}
  #btnSettings{background:#37474f;padding:6px 12px;border-radius:8px;font-size:16px;color:#fff;border:none;}
  #gameWrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative;}
  canvas{width:100%;max-height:100%;background:#1b1f2a;touch-action:none;}
  #controls{display:flex;justify-content:space-between;padding:8px;gap:8px;position:relative;}
  #moveControls, #actionControls{display:flex;gap:8px;}
  #actionControls{flex-wrap:wrap;max-width:260px;}
  button{border:none;border-radius:10px;padding:14px 10px;font-size:14px;font-weight:bold;color:#fff;touch-action:none;user-select:none;-webkit-user-select:none;}
  #moveControls button{background:#37474f;min-width:64px;}
  .guardBtn.high{background:#c62828;}
  .guardBtn.mid{background:#f9a825;color:#222;}
  .guardBtn.low{background:#1565c0;}
  .guardBtn:disabled, #btnAttack:disabled{opacity:0.35;}
  #btnAttack{background:#ff9100;color:#222;flex-basis:100%;}
  button:active{filter:brightness(1.3);}

  #overlay{position:absolute;inset:0;background:rgba(8,9,13,0.94);display:flex;align-items:center;justify-content:center;z-index:10;overflow-y:auto;}
  #overlay.hidden{display:none;}
  #overlayBox{max-width:94%;width:440px;text-align:center;padding:20px 0;}
  #overlayBox h1{margin:0 0 4px;font-size:26px;letter-spacing:2px;background:linear-gradient(90deg,#ff9100,#ff5252);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #overlayBox p{color:#9aa0ab;font-size:12.5px;margin:0 0 16px;line-height:1.5;}

  #levelSelectGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:400px;margin:0 auto 18px;padding:0 12px;}
  .lvlCard{position:relative;aspect-ratio:1/1;border-radius:12px;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-weight:bold;}
  .lvlCard .num{font-size:18px;}
  .lvlCard .tag{font-size:9px;font-weight:normal;opacity:0.8;}
  .lvlCard.playable{background:linear-gradient(145deg,#2f3a52,#232a3d);color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,0.06) inset;}
  .lvlCard.playable:active{filter:brightness(1.25);}
  .lvlCard.current{background:linear-gradient(145deg,#ff9100,#e65100);color:#221200;box-shadow:0 0 12px rgba(255,145,0,0.55);}
  .lvlCard.cleared{background:linear-gradient(145deg,#2e7d32,#1b5e20);color:#e8f5e9;}
  .lvlCard.locked{background:#161a22;color:#454c5a;}
  .lvlCard.locked .num{opacity:0.5;}
  .lvlCard.final{background:linear-gradient(145deg,#4a148c,#880e4f);color:#fce4ec;box-shadow:0 0 12px rgba(216,27,96,0.6);}

  #overlayButtons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  #overlayButtons button{background:#2e7d32;padding:12px 22px;border-radius:10px;}
  #overlayButtons button.secondary{background:#37474f;}
  #overlayButtons button.settingsLink{background:#37474f;}

  /* Settings overlay */
  #settingsOverlay{position:absolute;inset:0;background:rgba(8,9,13,0.97);z-index:30;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;}
  #settingsOverlay.hidden{display:none;}
  #settingsBox{width:92%;max-width:480px;background:#1b2029;border-radius:14px;padding:16px;margin:16px auto;}
  .settingsHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .settingsHeader h2{margin:0;font-size:18px;}
  #btnCloseSettings{background:#37474f;border-radius:8px;padding:6px 12px;font-size:14px;}
  .settingsTabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .tabBtn{background:#252b38;padding:8px 6px;border-radius:8px;font-size:11px;flex:1;min-width:70px;color:#ccc;}
  .tabBtn.active{background:#ff9100;color:#221200;}
  .tabPane.hidden{display:none;}
  .langOption{background:#252b38;padding:14px;border-radius:10px;margin:4px;font-size:14px;width:calc(50% - 16px);}
  .langOption.selected{outline:2px solid #ff9100;}
  .pickGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .pickCard{background:#252b38;border-radius:10px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .pickCard.selected{outline:2px solid #ff9100;}
  .pickCard .swatch{width:36px;height:36px;border-radius:8px;}
  .pickCard .pickName{font-size:10px;text-align:center;line-height:1.2;}
  .hint{font-size:12px;color:#9aa0ab;margin-bottom:10px;}
  .layoutRow{background:#252b38;border-radius:10px;padding:10px;margin-bottom:10px;}
  .layoutRowTitle{font-size:13px;font-weight:bold;margin-bottom:6px;}
  .layoutRow label{display:block;font-size:11px;color:#9aa0ab;margin-bottom:8px;}
  .layoutRow input[type=range]{width:100%;}
  #btnResetLayout{background:#616161;width:100%;margin-top:4px;}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div id="levelLabel">LEVEL 1</div>
    <div id="hpRow">
      <div id="playerHp"><span id="playerLabel">你</span> <span id="playerHearts"></span></div>
      <div id="enemyHp"><span id="enemyLabel">敵</span> <span class="bar"><span id="enemyHpFill"></span></span> <span id="enemyHpNum">3/3</span></div>
    </div>
    <button id="btnSettings">⚙</button>
  </div>
  <div id="gameWrap"><canvas id="game" width="800" height="360"></canvas></div>
  <div id="controls">
    <div id="moveControls">
      <button id="btnBack">◀後退</button>
      <button id="btnForward">前進▶</button>
    </div>
    <div id="actionControls">
      <button id="btnHigh" class="guardBtn high">上格擋</button>
      <button id="btnMid" class="guardBtn mid">中格擋</button>
      <button id="btnLow" class="guardBtn low">下格擋</button>
      <button id="btnAttack">斬 擊</button>
    </div>
  </div>
  <div id="overlay">
    <div id="overlayBox">
      <h1 id="overlayTitle">格擋之刃</h1>
      <p id="overlayText"></p>
      <div id="levelSelectGrid"></div>
      <div id="overlayButtons"></div>
    </div>
  </div>
  <div id="settingsOverlay" class="hidden">
    <div id="settingsBox">
      <div class="settingsHeader">
        <h2 id="settingsTitle">設定</h2>
        <button id="btnCloseSettings">✕</button>
      </div>
      <div class="settingsTabs">
        <button class="tabBtn active" data-tab="lang">語言</button>
        <button class="tabBtn" data-tab="char">人物</button>
        <button class="tabBtn" data-tab="weapon">武器</button>
        <button class="tabBtn" data-tab="layout">按鍵配置</button>
      </div>
      <div id="tabLang" class="tabPane">
        <button class="langOption" data-lang="zh">中文</button>
        <button class="langOption" data-lang="en">English</button>
      </div>
      <div id="tabChar" class="tabPane hidden">
        <div id="charGrid" class="pickGrid"></div>
      </div>
      <div id="tabWeapon" class="tabPane hidden">
        <div id="weaponGrid" class="pickGrid"></div>
      </div>
      <div id="tabLayout" class="tabPane hidden">
        <p class="hint" id="layoutHint"></p>
        <div id="layoutControls"></div>
        <button id="btnResetLayout">重置配置</button>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
"use strict";
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const CANVAS_W=800, CANVAS_H=360;
const GROUND_Y=290;
const PLAYER_MIN_X=50, PLAYER_MAX_X=340;
const PLAYER_SPEED=0.28;
const FOLLOW_OFFSET=110;
const MELEE_RANGE=130;

const ATTACK_COOLDOWN=10000;
const ATTACK_VISUAL_DURATION=150;
const GUARD_DURATION=1000;
const PERFECT_WINDOW=170;

const ACTIVE_DURATION=130;
const ENEMY_ATTACK_RANGE=145;
const STUN_DURATION=800;
const PLAYER_HURT_DURATION=450;
const KNOCKBACK=45;

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function laneColor(l){return l==='high'?'#ef5350':l==='mid'?'#ffca28':'#42a5f5';}
function laneLabel(l){return l==='high'?'上':l==='mid'?'中':'下';}
function laneFullLabel(l){return l==='high'?'上段防禦':l==='mid'?'中段防禦':'下段防禦';}
function lerp(a,b,t){return a+(b-a)*t;}

function getLevelConfig(lv){
  const isFinal = lv>=30;
  return {
    telegraph: isFinal ? 0 : Math.max(160, 950 - lv*36),
    noTelegraph: isFinal,
    idleWait: Math.max(300, 1500 - lv*40),
    recover: Math.max(200, 620 - lv*13),
    comboChance: Math.min(1, Math.max(0,(lv-6)*0.05)),
    hp: 3 + Math.floor(lv/2),
    approachSpeed: 0.3 + lv*0.015
  };
}

// ===================== 語言 =====================
const LANG = {
  zh: {
    title:'格擋之刃',
    instructions:'點擊格擋鍵立即進入該方向防禦，成功擋下（含完美格擋）會立即解除。斬擊即時觸發但有 10 秒冷卻；敵人前搖時斬擊可打斷其攻擊，其餘時候攻擊會被敵人格擋。第 30 關的敵人攻擊沒有任何預警。',
    you:'你', enemy:'敵',
    guardHigh:'上格擋', guardMid:'中格擋', guardLow:'下格擋', attack:'斬 擊',
    back:'◀後退', forward:'前進▶',
    cleared:'已通關', challenge:'挑戰', locked:'鎖定', final:'終極',
    levelPrefix:'LEVEL ', finalSuffix:' ★終極決戰★',
    defeatTitle:'被擊敗',
    defeatFinal:'最終決戰... 敵人的斬擊沒有任何預警，這是真正的試煉。',
    defeatNormal:(lv)=>'第 '+lv+' 關... 善用打斷機制，抓準敵人前搖的瞬間出手！',
    retry:'重試', menu:'返回選單',
    clearTitle:'關卡過關', clearText:(lv)=>'第 '+lv+' 關 完成！',
    nextLevel:'下一關',
    allClearTitle:'恭喜全破！', allClearText:'你已完成全部 30 關的試煉，擊敗了毫無預警的終極對手！',
    settings:'設定', close:'關閉',
    tabLang:'語言', tabChar:'人物', tabWeapon:'武器', tabLayout:'按鍵配置',
    chinese:'中文', english:'English',
    layoutHint:'調整每個按鍵的位置與大小（即時預覽）',
    posX:'水平位移', posY:'垂直位移', size:'大小',
    resetLayout:'重置配置',
    perfectGuard:'完美格擋!', guardText:'格擋', hit:'中招!', dodge:'閃避!', interrupt:'打斷!', slash:'斬中!', blocked:'被格擋', miss:'落空'
  },
  en: {
    title:'Blade of Parry',
    instructions:'Tap a guard button to instantly enter that stance; a successful block (including a perfect parry) ends it immediately. Attacks trigger instantly but have a 10s cooldown. Hitting an enemy during its windup interrupts the attack; otherwise it will be blocked. Level 30 enemy attacks have no warning at all.',
    you:'You', enemy:'Enemy',
    guardHigh:'High Guard', guardMid:'Mid Guard', guardLow:'Low Guard', attack:'Attack',
    back:'◀ Back', forward:'Forward ▶',
    cleared:'Cleared', challenge:'Play', locked:'Locked', final:'Final',
    levelPrefix:'LEVEL ', finalSuffix:' ★FINAL BATTLE★',
    defeatTitle:'Defeated',
    defeatFinal:'Final battle... the enemy strikes without any warning. A true trial.',
    defeatNormal:(lv)=>'Level '+lv+'... read the windup and counter the instant it ends!',
    retry:'Retry', menu:'Main Menu',
    clearTitle:'Level Cleared', clearText:(lv)=>'Level '+lv+' complete!',
    nextLevel:'Next Level',
    allClearTitle:'All Clear!', allClearText:'You have conquered all 30 levels, including the warningless final boss!',
    settings:'Settings', close:'Close',
    tabLang:'Language', tabChar:'Character', tabWeapon:'Weapon', tabLayout:'Button Layout',
    chinese:'中文', english:'English',
    layoutHint:"Adjust each button's position and size (live preview)",
    posX:'Horizontal', posY:'Vertical', size:'Size',
    resetLayout:'Reset Layout',
    perfectGuard:'PERFECT!', guardText:'Blocked', hit:'Hit!', dodge:'Dodge!', interrupt:'Interrupt!', slash:'Slash!', blocked:'Parried', miss:'Miss'
  }
};

// ===================== 人物 / 武器 =====================
const CHARACTERS = [
  {id:'c1', name:{zh:'蒼藍劍士',en:'Azure Swordsman'}, skin:'#ffccab', body:'#3b6fb0', bodyHi:'#5c93d6', limb:'#274a73', crest:'#ffca28'},
  {id:'c2', name:{zh:'赤紅武士',en:'Crimson Samurai'}, skin:'#e2b8a3', body:'#b71c1c', bodyHi:'#e53935', limb:'#5c1010', crest:'#ffd54f'},
  {id:'c3', name:{zh:'翠綠遊俠',en:'Emerald Ranger'}, skin:'#f0c9a0', body:'#2e7d32', bodyHi:'#66bb6a', limb:'#1b4d1e', crest:'#c5e1a5'},
  {id:'c4', name:{zh:'紫魅劍客',en:'Violet Duelist'}, skin:'#e8c3d0', body:'#6a1b9a', bodyHi:'#9c4dcc', limb:'#3e0f5c', crest:'#ce93d8'},
  {id:'c5', name:{zh:'玄鐵武者',en:'Iron Warrior'}, skin:'#d2a679', body:'#455a64', bodyHi:'#78909c', limb:'#263238', crest:'#b0bec5'},
  {id:'c6', name:{zh:'金翼聖騎',en:'Golden Paladin'}, skin:'#ffe0b2', body:'#f9a825', bodyHi:'#ffd54f', limb:'#8d6e00', crest:'#ffffff'}
];
const WEAPONS = [
  {id:'w1', name:{zh:'制式長劍',en:'Standard Sword'}, shape:'sword', bladeStart:'#eceff1', bladeEnd:'#fafafa', trail:'rgba(255,255,255,0.9)', particle:'#fff59d'},
  {id:'w2', name:{zh:'寒冰之劍',en:'Ice Sword'}, shape:'sword', bladeStart:'#80deea', bladeEnd:'#e0f7fa', trail:'rgba(128,222,234,0.9)', particle:'#b2ebf2'},
  {id:'w3', name:{zh:'烈焰之劍',en:'Flame Sword'}, shape:'sword', bladeStart:'#ff7043', bladeEnd:'#ffccbc', trail:'rgba(255,112,67,0.9)', particle:'#ffab91'},
  {id:'w4', name:{zh:'戰斧',en:'Battle Axe'}, shape:'axe', bladeStart:'#b0bec5', bladeEnd:'#eceff1', trail:'rgba(207,216,220,0.9)', particle:'#eceff1'},
  {id:'w5', name:{zh:'影匕首',en:'Shadow Dagger'}, shape:'dagger', bladeStart:'#7e57c2', bladeEnd:'#d1c4e9', trail:'rgba(149,117,205,0.9)', particle:'#b39ddb'},
  {id:'w6', name:{zh:'雷之槌',en:'Thunder Hammer'}, shape:'hammer', bladeStart:'#fff176', bladeEnd:'#ffee58', trail:'rgba(255,245,157,0.9)', particle:'#fff9c4'}
];

function defaultLayout(){
  return {
    high:{dx:0,dy:0,scale:1},
    mid:{dx:0,dy:0,scale:1},
    low:{dx:0,dy:0,scale:1},
    attack:{dx:0,dy:0,scale:1}
  };
}
const settings = {
  language: localStorage.getItem('gb_lang') || 'zh',
  characterId: localStorage.getItem('gb_char') || 'c1',
  weaponId: localStorage.getItem('gb_weapon') || 'w1',
  layout: JSON.parse(localStorage.getItem('gb_layout')||'null') || defaultLayout()
};
function t(key){ return LANG[settings.language][key]; }
function getCurrentCharacter(){ return CHARACTERS.find(c=>c.id===settings.characterId) || CHARACTERS[0]; }
function getCurrentWeapon(){ return WEAPONS.find(w=>w.id===settings.weaponId) || WEAPONS[0]; }
function saveSettings(){
  localStorage.setItem('gb_lang', settings.language);
  localStorage.setItem('gb_char', settings.characterId);
  localStorage.setItem('gb_weapon', settings.weaponId);
  localStorage.setItem('gb_layout', JSON.stringify(settings.layout));
}

const state={ screen:'menu', level:1, maxUnlocked: parseInt(localStorage.getItem('parrygame_maxlevel')||'1',10), settingsOpen:false };

const player={
  x:150,y:GROUND_Y,facing:1,hp:3,maxHp:3,state:'idle',
  hurtUntil:0,
  attackCooldownUntil:0,attackVisualUntil:0,
  guardLane:null,guardStart:0,guardEnd:0,
  bob:0
};

const enemy={
  x:500,y:GROUND_Y,facing:-1,hp:3,maxHp:3,state:'chase',timer:0,phaseEnd:0,attackLane:null,cfg:null,bob:0
};

const input={moveBack:false,moveForward:false};
let effects=[];
let particles=[];
let shake={mag:0,until:0};
let flashColor=null,flashUntil=0;

function spawnEffect(text,x,y,color){
  effects.push({text,x,y,color,start:performance.now(),duration:700});
}
function addShake(mag,dur){
  shake.mag=Math.max(shake.mag,mag);
  shake.until=performance.now()+dur;
}
function flash(color,dur){ flashColor=color; flashUntil=performance.now()+dur; }

function spawnParticles(x,y,count,opts){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=(opts.speed||2)*(0.5+Math.random());
    particles.push({
      x,y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd - (opts.upBias||0),
      life:0,maxLife:opts.life||500,
      size:opts.size||3+Math.random()*3,
      color:opts.color||'#fff',
      gravity:opts.gravity!=null?opts.gravity:0.006,
      shape:opts.shape||'circle'
    });
  }
}
function spawnSparkBurst(x,y,color){
  for(let i=0;i<14;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=3+Math.random()*4;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:0,maxLife:380,
      size:2+Math.random()*2,color,gravity:0.002,shape:'line',ang});
  }
}
function spawnRing(x,y,color){
  particles.push({x,y,life:0,maxLife:400,size:6,color,ring:true,gravity:0});
}
function updateParticles(dt){
  particles=particles.filter(p=>p.life<p.maxLife);
  particles.forEach(p=>{
    p.life+=dt;
    if(p.ring)return;
    p.vy+=p.gravity*dt;
    p.x+=p.vx*(dt/16);
    p.y+=p.vy*(dt/16);
  });
}
function drawParticles(){
  particles.forEach(p=>{
    const t=p.life/p.maxLife;
    const alpha=1-t;
    ctx.save();ctx.globalAlpha=Math.max(0,alpha);
    if(p.ring){
      ctx.strokeStyle=p.color;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size+t*36,0,Math.PI*2);ctx.stroke();
    } else if(p.shape==='line'){
      ctx.strokeStyle=p.color;ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x-Math.cos(p.ang)*8,p.y-Math.sin(p.ang)*8);
      ctx.stroke();
    } else {
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*(1-t*0.4),0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
}

// ---- Player actions ----
function pressGuard(lane){
  if(state.screen!=='playing'||state.settingsOpen)return;
  if(player.state!=='idle')return;
  const t=performance.now();
  player.state='guarding';
  player.guardLane=lane;
  player.guardStart=t;
  player.guardEnd=t+GUARD_DURATION;
  updateButtonStates();
}
function cancelGuardSuccess(){
  player.state='idle';
  player.guardLane=null;
  updateButtonStates();
}

function triggerAttack(){
  if(state.screen!=='playing'||state.settingsOpen)return;
  if(player.state==='guarding'||player.state==='hurt')return;
  const t=performance.now();
  if(t<player.attackCooldownUntil)return;
  player.attackCooldownUntil=t+ATTACK_COOLDOWN;
  player.attackVisualUntil=t+ATTACK_VISUAL_DURATION;
  updateButtonStates();
  resolvePlayerAttack(t);
}

function resolvePlayerAttack(t){
  const weaponObj=getCurrentWeapon();
  const dist=Math.abs(enemy.x-player.x);
  if(dist>MELEE_RANGE||enemy.state==='dead'){
    spawnEffect(t_('miss'),player.x,player.y-70,'#90a4ae');
    return;
  }
  if(enemy.state==='windup'){
    enemy.hp--;
    spawnEffect(t_('interrupt'),enemy.x,enemy.y-60,'#ffd54f');
    spawnParticles(enemy.x,enemy.y-55,12,{color:weaponObj.particle,speed:3.5,life:420,upBias:1});
    spawnSparkBurst(enemy.x,enemy.y-55,weaponObj.particle);
    addShake(6,180);
    enemy.attackLane=null;
    if(checkEnemyDeath())return;
    enemy.state='chase';
    enemy.timer=enemy.cfg.idleWait;
    return;
  }
  if(enemy.state==='stunned'){
    enemy.hp--;
    spawnEffect(t_('slash'),enemy.x,enemy.y-60,'#ffd54f');
    spawnParticles(enemy.x,enemy.y-55,12,{color:weaponObj.particle,speed:3.5,life:420,upBias:1});
    spawnSparkBurst(enemy.x,enemy.y-55,weaponObj.particle);
    addShake(6,180);
    checkEnemyDeath();
    return;
  }
  spawnEffect(t_('blocked'),enemy.x,enemy.y-60,'#b0bec5');
  spawnSparkBurst(enemy.x,enemy.y-55,'#eceff1');
  addShake(3,120);
}
function t_(key){ return t(key); }

function updateButtonStates(){
  const now=performance.now();
  const guardBusy = player.state==='guarding' || player.state==='hurt';
  const disabledBase = state.screen!=='playing' || guardBusy || state.settingsOpen;
  ['btnHigh','btnMid','btnLow'].forEach(id=>document.getElementById(id).disabled = disabledBase);
  const atkBtn=document.getElementById('btnAttack');
  const onCooldown = now<player.attackCooldownUntil;
  atkBtn.disabled = state.screen!=='playing' || guardBusy || onCooldown || state.settingsOpen;
  if(state.screen==='playing' && onCooldown){
    const remain=Math.max(0,(player.attackCooldownUntil-now)/1000);
    atkBtn.textContent=t('attack')+' ('+remain.toFixed(1)+'s)';
  } else {
    atkBtn.textContent=t('attack');
  }
}

function damagePlayer(){
  if(state.screen!=='playing')return;
  player.hp--;
  player.state='hurt';
  player.hurtUntil=performance.now()+PLAYER_HURT_DURATION;
  player.guardLane=null;
  const dir = player.x<enemy.x?-1:1;
  player.x=clamp(player.x+dir*KNOCKBACK,PLAYER_MIN_X,PLAYER_MAX_X);
  spawnParticles(player.x,player.y-50,10,{color:'#ff5252',speed:3,life:450,upBias:2});
  addShake(8,300);
  flash('rgba(255,0,0,0.25)',180);
  updateButtonStates();
  if(player.hp<=0)playerDies();
}
function checkEnemyDeath(){
  if(enemy.hp<=0&&enemy.state!=='dead'){enemyDies();return true;}
  return false;
}

function resolveEnemyHit(t){
  const dist=Math.abs(enemy.x-player.x);
  if(dist>ENEMY_ATTACK_RANGE){
    spawnEffect(t_('dodge'),player.x,player.y-70,'#b0bec5');
    return;
  }
  const guarding = player.state==='guarding' && player.guardLane===enemy.attackLane;
  if(guarding){
    const elapsed=t-player.guardStart;
    if(elapsed<=PERFECT_WINDOW){
      enemy.hp--;
      spawnEffect(t_('perfectGuard'),player.x,player.y-70,'#69f0ae');
      spawnRing(player.x,player.y-55,'#69f0ae');
      spawnSparkBurst(player.x,player.y-55,'#b9f6ca');
      addShake(10,260);
      flash('rgba(105,255,178,0.25)',180);
      cancelGuardSuccess();
      if(checkEnemyDeath())return;
      enemy.state='stunned';enemy.phaseEnd=t+STUN_DURATION;
    } else {
      spawnEffect(t_('guardText'),player.x,player.y-70,'#90caf9');
      spawnSparkBurst(player.x,player.y-55,'#e3f2fd');
      addShake(4,150);
      cancelGuardSuccess();
    }
  } else {
    spawnEffect(t_('hit'),player.x,player.y-70,'#ff5252');
    damagePlayer();
  }
}

function startEnemyWindup(t){
  const lanes=['high','mid','low'];
  enemy.attackLane=lanes[Math.floor(Math.random()*3)];
  if(enemy.cfg.noTelegraph){
    enemy.state='active';
    enemy.phaseEnd=t+ACTIVE_DURATION;
    resolveEnemyHit(t);
    return;
  }
  enemy.state='windup';
  enemy.phaseEnd=t+enemy.cfg.telegraph;
}

function updateEnemy(dt,t){
  if(enemy.state==='dead')return;
  const cfg=enemy.cfg;
  enemy.facing = player.x<enemy.x ? -1:1;
  if(enemy.state!=='windup'&&enemy.state!=='active'){
    const targetX=player.x+FOLLOW_OFFSET;
    const diff=targetX-enemy.x;
    const maxStep=cfg.approachSpeed*dt;
    if(Math.abs(diff)<=maxStep)enemy.x=targetX;else enemy.x+=Math.sign(diff)*maxStep;
    enemy.x=clamp(enemy.x,player.x+MELEE_RANGE*0.5,780);
  }
  switch(enemy.state){
    case 'chase':
      enemy.timer-=dt;
      if(enemy.timer<=0)startEnemyWindup(t);
      break;
    case 'windup':
      if(t>=enemy.phaseEnd){
        enemy.state='active';enemy.phaseEnd=t+ACTIVE_DURATION;
        resolveEnemyHit(t);
      }
      break;
    case 'active':
      if(t>=enemy.phaseEnd){enemy.state='recover';enemy.phaseEnd=t+cfg.recover;}
      break;
    case 'recover':
      if(t>=enemy.phaseEnd){
        if(state.screen==='playing'&&Math.random()<cfg.comboChance){startEnemyWindup(t);}
        else{enemy.state='chase';enemy.timer=cfg.idleWait*(0.8+Math.random()*0.4);}
      }
      break;
    case 'stunned':
      if(t>=enemy.phaseEnd){enemy.state='chase';enemy.timer=cfg.idleWait*0.6;}
      break;
  }
}

function update(dt,t){
  player.facing = player.x<=enemy.x?1:-1;
  if(player.state!=='hurt'){
    let dir=0;
    if(input.moveBack)dir-=1;
    if(input.moveForward)dir+=1;
    player.x=clamp(player.x+dir*PLAYER_SPEED*dt,PLAYER_MIN_X,PLAYER_MAX_X);
  }
  player.bob=Math.sin(t/220)*3;
  enemy.bob=Math.sin(t/260+1)*3;

  if(player.state==='guarding'){
    if(t>=player.guardEnd){
      player.state='idle';player.guardLane=null;
      updateButtonStates();
    }
  } else if(player.state==='hurt'){
    if(t>=player.hurtUntil){player.state='idle';updateButtonStates();}
  }
  updateButtonStates();
  updateParticles(dt);
  if(state.screen!=='playing')return;
  updateEnemy(dt,t);
}

function drawBackground(){
  const g=ctx.createLinearGradient(0,0,0,CANVAS_H);
  g.addColorStop(0,'#2a3348');g.addColorStop(0.6,'#1c2130');g.addColorStop(1,'#11141c');
  ctx.fillStyle=g;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  ctx.fillStyle='rgba(255,255,255,0.03)';
  for(let i=0;i<6;i++){ ctx.fillRect(40+i*140,40,26,GROUND_Y-40); }
  const g2=ctx.createLinearGradient(0,GROUND_Y,0,CANVAS_H);
  g2.addColorStop(0,'#3a4358');g2.addColorStop(1,'#191c24');
  ctx.fillStyle=g2;ctx.fillRect(0,GROUND_Y,CANVAS_W,CANVAS_H-GROUND_Y);
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GROUND_Y);ctx.lineTo(CANVAS_W,GROUND_Y);ctx.stroke();
}

function drawWeaponHead(weapon,swordLen){
  const bladeGrad=ctx.createLinearGradient(0,0,0,-swordLen);
  bladeGrad.addColorStop(0,weapon.bladeStart);bladeGrad.addColorStop(1,weapon.bladeEnd);
  ctx.fillStyle=bladeGrad;
  if(weapon.shape==='axe'){
    ctx.beginPath();
    ctx.moveTo(-3,4);ctx.lineTo(3,4);ctx.lineTo(3,-18);
    ctx.lineTo(14,-22);ctx.lineTo(10,-34);ctx.lineTo(3,-30);ctx.lineTo(3,-34);ctx.lineTo(-3,-34);ctx.lineTo(-3,-30);
    ctx.lineTo(-10,-34);ctx.lineTo(-14,-22);ctx.lineTo(-3,-18);
    ctx.closePath();ctx.fill();
  } else if(weapon.shape==='hammer'){
    ctx.beginPath();ctx.moveTo(-3,4);ctx.lineTo(3,4);ctx.lineTo(3,-22);ctx.lineTo(-3,-22);ctx.closePath();ctx.fill();
    ctx.fillRect(-10,-34,20,14);
  } else if(weapon.shape==='dagger'){
    ctx.beginPath();
    ctx.moveTo(-3,4);ctx.lineTo(3,4);ctx.lineTo(2,-18);ctx.lineTo(0,-24);ctx.lineTo(-2,-18);
    ctx.closePath();ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(-3,4);ctx.lineTo(3,4);ctx.lineTo(2,-swordLen);ctx.lineTo(0,-swordLen-6);ctx.lineTo(-2,-swordLen);
    ctx.closePath();ctx.fill();
  }
}

function drawFighter(x,y,bob,facing,skin,pose,poseProgress,lane,color,weapon){
  ctx.save();
  ctx.translate(x,y+bob);
  ctx.scale(facing,1);

  const legSwing = pose==='idle' ? Math.sin(performance.now()/300)*4 : 0;

  ctx.save();ctx.globalAlpha=0.35;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,2,26,7,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  ctx.strokeStyle=color.limb;ctx.lineWidth=9;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-6,-34);ctx.lineTo(-10+legSwing,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,-34);ctx.lineTo(10-legSwing,0);ctx.stroke();

  let leanX=0, rot=0;
  if(pose==='guard-high'){ leanX=-4; rot=-0.1; }
  if(pose==='guard-mid'){ leanX=-6; rot=-0.03; }
  if(pose==='guard-low'){ leanX=-3; rot=0.08; }
  if(pose==='hurt'){ leanX=8; rot=0.15; }
  if(pose==='windup'){ rot=-0.12 - 0.15*poseProgress; leanX=-4; }
  if(pose==='attack'){ rot=lerp(-0.3,0.5,poseProgress); }
  if(pose==='stunned'){ rot=0.3; }

  ctx.save();
  ctx.translate(leanX,-34);
  ctx.rotate(rot);

  ctx.fillStyle=color.body;
  ctx.beginPath();
  ctx.moveTo(-13,0);ctx.lineTo(13,0);ctx.lineTo(10,-38);ctx.lineTo(-10,-38);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=color.bodyHi;
  ctx.beginPath();ctx.moveTo(-6,-4);ctx.lineTo(6,-4);ctx.lineTo(5,-30);ctx.lineTo(-5,-30);ctx.closePath();ctx.fill();

  ctx.strokeStyle=color.limb;ctx.lineWidth=8;ctx.lineCap='round';
  const backArmGuard = pose.startsWith('guard');
  ctx.beginPath();ctx.moveTo(-9,-32);ctx.lineTo(-18,-14+(backArmGuard?-8:0));ctx.stroke();
  if(backArmGuard){
    ctx.beginPath();ctx.arc(-19,-24,6,0,Math.PI*2);ctx.fillStyle=color.limb;ctx.fill();
  }

  ctx.fillStyle=skin;
  ctx.beginPath();ctx.arc(0,-46,11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=color.crest;
  ctx.beginPath();ctx.ellipse(0,-54,9,5,0,Math.PI,Math.PI*2);ctx.fill();

  let armAngle=-0.5+Math.sin(performance.now()/300)*0.08;
  let swordLen=34;
  let swordTilt=0.5;
  if(pose==='guard-high'){ armAngle=-2.55; swordTilt=0.15; }
  else if(pose==='guard-mid'){ armAngle=-1.35; swordTilt=1.35; }
  else if(pose==='guard-low'){ armAngle=-0.15; swordTilt=1.9; }
  else if(pose==='windup'){
    const laneAngle = lane==='high' ? -2.3 : lane==='mid' ? -1.9 : -1.3;
    armAngle = lerp(-0.9, laneAngle, poseProgress);
  } else if(pose==='attack'){
    armAngle = lerp(-2.2, 1.1, poseProgress);
    swordTilt = lerp(0.2,0.9,poseProgress);
  } else if(pose==='hurt'){ armAngle=0.6; }
  else if(pose==='stunned'){ armAngle=1.1; }

  const shoulderX=8, shoulderY=-33;
  const handX=shoulderX+Math.cos(armAngle)*20;
  const handY=shoulderY+Math.sin(armAngle)*20;

  ctx.strokeStyle=color.limb;ctx.lineWidth=8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(shoulderX,shoulderY);ctx.lineTo(handX,handY);ctx.stroke();

  ctx.save();
  ctx.translate(handX,handY);
  ctx.rotate(armAngle - Math.PI/2 + swordTilt);
  drawWeaponHead(weapon,swordLen);
  ctx.fillStyle=color.crest;
  ctx.fillRect(-7,3,14,4);
  ctx.fillStyle='#4e342e';
  ctx.fillRect(-2,6,4,8);
  ctx.restore();

  if(pose.startsWith('guard')){
    ctx.save();
    ctx.globalAlpha=0.55+0.3*Math.sin(performance.now()/90);
    ctx.strokeStyle=laneColor(lane);
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.arc(handX,handY,15,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  if(pose==='attack' && poseProgress>0.3){
    ctx.save();
    ctx.strokeStyle=weapon.trail;
    ctx.lineWidth=5;
    ctx.beginPath();
    ctx.arc(shoulderX,shoulderY,26,-2.2,1.1);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
  ctx.restore();
}

const DEFAULT_WEAPON=WEAPONS[0];

function drawPlayer(t){
  let pose='idle', progress=0;
  if(player.state==='hurt'){
    pose='hurt';
  } else if(player.state==='guarding'){
    pose='guard-'+player.guardLane;
  } else if(t<player.attackVisualUntil){
    pose='attack';
    progress=1-(player.attackVisualUntil-t)/ATTACK_VISUAL_DURATION;
  }
  const charObj=getCurrentCharacter();
  const weaponObj=getCurrentWeapon();
  const color={body:charObj.body,bodyHi:charObj.bodyHi,limb:charObj.limb,crest:charObj.crest};
  drawFighter(player.x,player.y,player.bob,player.facing,charObj.skin,pose,progress,player.guardLane||'mid',color,weaponObj);

  if(player.state==='guarding'){
    const t2=performance.now();
    const frac=clamp((player.guardEnd-t2)/GUARD_DURATION,0,1);
    ctx.save();
    ctx.translate(player.x,player.y-118+player.bob);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=laneColor(player.guardLane);ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(0,0,13,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.lineWidth=3;ctx.strokeStyle='rgba(0,0,0,0.6)';
    ctx.strokeText(laneFullLabel(player.guardLane),0,-22);
    ctx.fillText(laneFullLabel(player.guardLane),0,-22);
    ctx.restore();
  }
}

function drawEnemy(t){
  let pose='idle', progress=0;
  if(enemy.state==='windup'){
    pose='windup';
    progress=1-Math.max(0,(enemy.phaseEnd-t)/enemy.cfg.telegraph);
  } else if(enemy.state==='active'){
    pose='attack';
    progress=0.6+ (t-(enemy.phaseEnd-ACTIVE_DURATION))/ACTIVE_DURATION*0.4;
  } else if(enemy.state==='stunned'){
    pose='stunned';
  }
  const color={body:'#a13c3c',bodyHi:'#c9615f',limb:'#5f2323',crest:'#ffe082'};
  drawFighter(enemy.x,enemy.y,enemy.bob,enemy.facing,'#e2b8a3',pose,progress,enemy.attackLane||'mid',color,DEFAULT_WEAPON);

  if(enemy.state==='windup'){
    const remain=enemy.phaseEnd-t;
    const frac=Math.max(0,remain/enemy.cfg.telegraph);
    ctx.save();ctx.translate(enemy.x,enemy.y-128+enemy.bob);
    ctx.scale(0.7+frac*0.9,0.7+frac*0.9);
    ctx.save();ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.fillStyle=laneColor(enemy.attackLane);ctx.fill();
    ctx.restore();
    ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fillStyle=laneColor(enemy.attackLane);ctx.fill();
    ctx.fillStyle='#000';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(laneLabel(enemy.attackLane),0,1);
    ctx.restore();
  }
  if(enemy.state==='stunned'){
    ctx.save();
    ctx.fillStyle='#fff176';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    const wob=Math.sin(t/80)*4;
    ctx.fillText('★ ★ ★',enemy.x+wob,enemy.y-118+enemy.bob);
    ctx.restore();
  }
}

function drawEffects(t){
  effects=effects.filter(e=>t-e.start<e.duration);
  effects.forEach(e=>{
    const age=t-e.start;const a=1-age/e.duration;
    ctx.save();ctx.globalAlpha=Math.max(0,a);
    ctx.fillStyle=e.color;
    ctx.font='bold 20px sans-serif';ctx.textAlign='center';
    ctx.lineWidth=3;ctx.strokeStyle='rgba(0,0,0,0.6)';
    ctx.strokeText(e.text,e.x,e.y-age*0.06);
    ctx.fillText(e.text,e.x,e.y-age*0.06);
    ctx.restore();
  });
}
function updateHUD(){
  document.getElementById('levelLabel').textContent=t('levelPrefix')+state.level+(state.level>=30?t('finalSuffix'):'');
  const hearts=document.getElementById('playerHearts');
  hearts.innerHTML='';
  for(let i=0;i<player.maxHp;i++){
    const d=document.createElement('span');
    d.className='heart'+(i<player.hp?' full':'');
    hearts.appendChild(d);
  }
  const hp=Math.max(0,enemy.hp);
  const pct=enemy.maxHp?hp/enemy.maxHp*100:0;
  document.getElementById('enemyHpFill').style.width=pct+'%';
  document.getElementById('enemyHpNum').textContent=hp+'/'+enemy.maxHp;
}
function render(t){
  ctx.save();
  const now=performance.now();
  if(now<shake.until){
    const m=shake.mag*((shake.until-now)/300);
    ctx.translate((Math.random()-0.5)*m,(Math.random()-0.5)*m);
  } else { shake.mag=0; }

  ctx.clearRect(-20,-20,CANVAS_W+40,CANVAS_H+40);
  drawBackground();
  if(state.screen==='playing'||state.screen==='cleared'||state.screen==='dead'){
    if(player.x<enemy.x){ drawPlayer(t); drawEnemy(t); } else { drawEnemy(t); drawPlayer(t); }
    drawParticles();
    drawEffects(t);
  }
  if(now<flashUntil && flashColor){
    ctx.fillStyle=flashColor;
    ctx.fillRect(-20,-20,CANVAS_W+40,CANVAS_H+40);
  }
  ctx.restore();
  updateHUD();
}

let lastTime=0;
function loop(t){
  if(!lastTime)lastTime=t;
  const dt=Math.min(50,t-lastTime);lastTime=t;
  if(!state.settingsOpen){
    if(state.screen==='playing')update(dt,t);
    else{ updateParticles(dt); updateButtonStates(); }
  }
  render(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function startLevel(n){
  state.level=n;
  const cfg=getLevelConfig(n);
  player.hp=player.maxHp=3;
  player.x=150;player.state='idle';player.guardLane=null;
  player.attackCooldownUntil=0;player.attackVisualUntil=0;
  enemy.cfg=cfg;enemy.hp=cfg.hp;enemy.maxHp=cfg.hp;
  enemy.x=player.x+FOLLOW_OFFSET;enemy.state='chase';enemy.timer=cfg.idleWait;
  effects=[];particles=[];
  state.screen='playing';
  updateButtonStates();
  hideOverlay();
}
function playerDies(){
  state.screen='dead';
  const msg = state.level>=30 ? t('defeatFinal') : t('defeatNormal')(state.level);
  showOverlay(t('defeatTitle'),msg,[
    {label:t('retry'),action:()=>startLevel(state.level)},
    {label:t('menu'),action:showMenu,secondary:true}
  ]);
}
function enemyDies(){
  enemy.state='dead';
  const weaponObj=getCurrentWeapon();
  spawnParticles(enemy.x,enemy.y-50,24,{color:weaponObj.particle,speed:5,life:600,upBias:3});
  addShake(12,400);
  if(state.level>=state.maxUnlocked){
    state.maxUnlocked=Math.min(31,state.level+1);
    localStorage.setItem('parrygame_maxlevel',String(state.maxUnlocked));
  }
  state.screen='cleared';
  if(state.level>=30){
    showOverlay(t('allClearTitle'),t('allClearText'),[{label:t('menu'),action:showMenu}]);
  } else {
    showOverlay(t('clearTitle'),t('clearText')(state.level),[
      {label:t('nextLevel'),action:()=>startLevel(state.level+1)},
      {label:t('menu'),action:showMenu,secondary:true}
    ]);
  }
}

function hideOverlay(){document.getElementById('overlay').classList.add('hidden');}
function showOverlay(title,text,buttons){
  document.getElementById('overlayTitle').textContent=title;
  document.getElementById('overlayText').textContent=text;
  document.getElementById('levelSelectGrid').innerHTML='';
  const btnArea=document.getElementById('overlayButtons');
  btnArea.innerHTML='';
  buttons.forEach(b=>{
    const el=document.createElement('button');
    el.textContent=b.label;
    if(b.secondary)el.className='secondary';
    el.onclick=b.action;
    btnArea.appendChild(el);
  });
  document.getElementById('overlay').classList.remove('hidden');
}
function showMenu(){
  state.screen='menu';
  const grid=document.getElementById('levelSelectGrid');
  grid.innerHTML='';
  for(let i=1;i<=30;i++){
    const b=document.createElement('button');
    b.className='lvlCard';
    let status='locked', tag=t('locked');
    if(i<state.maxUnlocked){status='cleared';tag=t('cleared');}
    else if(i===state.maxUnlocked){status='current';tag=t('challenge');}
    if(i===30 && status!=='locked'){
      b.classList.add('final');
    } else {
      b.classList.add(status==='locked'?'locked':(status==='current'?'current':'cleared'));
    }
    if(status!=='locked'){ b.classList.add('playable'); b.onclick=()=>startLevel(i); }
    else { b.disabled=true; }
    b.innerHTML = status==='locked'
      ? `<div class="num">🔒</div><div class="tag">${i}</div>`
      : `<div class="num">${i}</div><div class="tag">${i===30?t('final'):tag}</div>`;
    grid.appendChild(b);
  }
  document.getElementById('overlayTitle').textContent=t('title');
  document.getElementById('overlayText').textContent=t('instructions');
  document.getElementById('overlayButtons').innerHTML='';
  document.getElementById('overlay').classList.remove('hidden');
}

}

function buildCharGrid(){
  const grid=document.getElementById('charGrid');
  grid.innerHTML='';
  CHARACTERS.forEach(c=>{
    const b=document.createElement('button');
    b.className='pickCard'+(c.id===settings.characterId?' selected':'');
    b.innerHTML=`<div class="swatch" style="background:${c.body}"></div><div class="pickName">${c.name[settings.language]}</div>`;
    b.onclick=()=>{ settings.characterId=c.id; saveSettings(); buildCharGrid(); };
    grid.appendChild(b);
  });
}
function buildWeaponGrid(){
  const grid=document.getElementById('weaponGrid');
  grid.innerHTML='';
  WEAPONS.forEach(w=>{
    const b=document.createElement('button');
    b.className='pickCard'+(w.id===settings.weaponId?' selected':'');
    b.innerHTML=`<div class="swatch" style="background:linear-gradient(135deg,${w.bladeStart},${w.bladeEnd})"></div><div class="pickName">${w.name[settings.language]}</div>`;
    b.onclick=()=>{ settings.weaponId=w.id; saveSettings(); buildWeaponGrid(); };
    grid.appendChild(b);
  });
}
function buildLayoutControls(){
  const container=document.getElementById('layoutControls');
  container.innerHTML='';
  const labels={high:t('guardHigh'),mid:t('guardMid'),low:t('guardLow'),attack:t('attack')};
  ['high','mid','low','attack'].forEach(key=>{
    const l=settings.layout[key];
    const row=document.createElement('div');
    row.className='layoutRow';
    row.innerHTML=`
      <div class="layoutRowTitle">${labels[key]}</div>
      <label>${t('posX')}
        <input type="range" min="-60" max="60" value="${l.dx}" data-key="${key}" data-prop="dx">
      </label>
      <label>${t('posY')}
        <input type="range" min="-60" max="60" value="${l.dy}" data-key="${key}" data-prop="dy">
      </label>
      <label>${t('size')}
        <input type="range" min="0.7" max="1.6" step="0.05" value="${l.scale}" data-key="${key}" data-prop="scale">
      </label>
    `;
    container.appendChild(row);
  });
  container.querySelectorAll('input[type=range]').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const key=e.target.dataset.key, prop=e.target.dataset.prop;
      settings.layout[key][prop]=parseFloat(e.target.value);
      applyLayout();
      saveSettings();
    });
  });
}
function applyLayout(){
  ['high','mid','low','attack'].forEach(key=>{
    const btnId = key==='attack' ? 'btnAttack' : 'btn'+key.charAt(0).toUpperCase()+key.slice(1);
    const el=document.getElementById(btnId);
    const l=settings.layout[key];
    el.style.transform = `translate(${l.dx}px, ${l.dy}px) scale(${l.scale})`;
  });
}

function openSettings(){
  state.settingsOpen=true;
  refreshSettingsHeader();
  buildCharGrid();buildWeaponGrid();buildLayoutControls();
  document.getElementById('settingsOverlay').classList.remove('hidden');
}
function closeSettings(){
  state.settingsOpen=false;
  document.getElementById('settingsOverlay').classList.add('hidden');
  if(state.screen==='menu')showMenu();
}

document.getElementById('btnSettings').addEventListener('pointerdown',e=>{e.preventDefault();openSettings();});
document.getElementById('btnCloseSettings').addEventListener('pointerdown',e=>{e.preventDefault();closeSettings();});

document.querySelectorAll('.tabBtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tabBtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tabPane').forEach(p=>p.classList.add('hidden'));
    document.getElementById('tab'+btn.dataset.tab.charAt(0).toUpperCase()+btn.dataset.tab.slice(1)).classList.remove('hidden');
  });
});
document.querySelectorAll('.langOption').forEach(btn=>{
  btn.addEventListener('click',()=>{
    settings.language=btn.dataset.lang;
    saveSettings();
    applyStaticTexts();
    refreshSettingsHeader();
    buildCharGrid();buildWeaponGrid();buildLayoutControls();
    if(state.screen==='menu')showMenu();
  });
});
document.getElementById('btnResetLayout').addEventListener('click',()=>{
  settings.layout=defaultLayout();
  saveSettings();
  applyLayout();
  buildLayoutControls();
});

// ===================== 操作綁定 =====================
function bindTap(el,fn){
  el.addEventListener('pointerdown',e=>{e.preventDefault();fn();});
}
document.getElementById('btnBack').addEventListener('pointerdown',e=>{e.preventDefault();input.moveBack=true;});
['pointerup','pointercancel','pointerleave'].forEach(ev=>document.getElementById('btnBack').addEventListener(ev,()=>input.moveBack=false));
document.getElementById('btnForward').addEventListener('pointerdown',e=>{e.preventDefault();input.moveForward=true;});
['pointerup','pointercancel','pointerleave'].forEach(ev=>document.getElementById('btnForward').addEventListener(ev,()=>input.moveForward=false));

bindTap(document.getElementById('btnHigh'),()=>pressGuard('high'));
bindTap(document.getElementById('btnMid'),()=>pressGuard('mid'));
bindTap(document.getElementById('btnLow'),()=>pressGuard('low'));
bindTap(document.getElementById('btnAttack'),triggerAttack);

window.addEventListener('keydown',e=>{
  if(state.settingsOpen)return;
  if(e.code==='ArrowLeft'||e.code==='KeyA')input.moveBack=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')input.moveForward=true;
  if(e.code==='KeyQ')pressGuard('high');
  if(e.code==='KeyW')pressGuard('mid');
  if(e.code==='KeyE')pressGuard('low');
  if(e.code==='Space'||e.code==='KeyF'){e.preventDefault();triggerAttack();}
});
window.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')input.moveBack=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')input.moveForward=false;
});

// ===================== 初始化 =====================
applyStaticTexts();
applyLayout();
showMenu();
})();
</script>
</body>
</html>
