name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Cordova and cordova-res
        run: npm install -g cordova cordova-res

      - name: Init npm project
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      - name: Remove stray android folder if present
        run: rm -rf android

      - name: Use fixed debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Prepare source icon
        run: mkdir -p resources && cp icon.png resources/icon.png

      - name: Generate Android icons from custom image
        run: cordova-res android --type icon --skip-config --copy

      - name: Add Android platform
        run: cordova platform add cordova-android@13.0.0

      - name: Build APK
        run: cordova build android

      - name: Print APK signature fingerprint
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey | grep -A1 "SHA256:"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
