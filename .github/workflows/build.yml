name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Cordova and cordova-res
        run: npm install -g cordova cordova-res

      - name: Prepare source icon
        run: mkdir -p resources && cp icon.png resources/icon.png

      - name: Generate Android icons from custom image
        run: cordova-res android --type icon --skip-config --copy

      - name: Add Android platform
        run: cordova platform add android

      - name: Build APK
        run: cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
